<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗教教职人员备案管理系统</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/public.css">
</head>
<body>
    <div class="pub_mod_top">
        <div class="lefttop">
            <img class="icon_head_logo" src="images/icon_head_logo.svg" alt="">
            <p class="item_head_title">宗教教职人员备案管理</p>
            <img class="icon_btn_drawer" src="images/icon_drawer.svg" alt="">
        </div>
        <div class="righttop">
            <div class="con_search">
                <input placeholder="请输入" type="text">
                <img class="icon_sarch" src="images/icon_search_gray.svg" alt="">
            </div>
            <div class="con_mes">
                <p class="icon_mes mes_new">
                    <img src="images/icon_head_mes.svg" alt="">
                </p>
                <p class="item_name">消息</p>
            </div>
            <div class="con_mes">
                <p class="icon_mes">
                    <img src="images/icon_head_user.svg" alt="">
                </p>
                <p class="item_name">Admin</p>
                <img class="icon_more" src="images/icon_more_black.svg" alt="">
                <!-- 信息弹窗 -->
                <div class="mod_top_tc">
                    <div class="item_user_mes">
                        <img class="icon_user_mes" src="images/icon_top_password.svg" alt="">
                        <span>修改密码</span>
                    </div>
                    <div class="item_user_mes">
                        <img class="icon_user_mes" src="images/icon_top_edit.svg" alt="">
                        <span>实名信息管理</span>
                    </div>
                    <div class="item_user_mes">
                        <img class="icon_user_mes" src="images/icon_top_manage.svg" alt="">
                        <span>系统管理</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
