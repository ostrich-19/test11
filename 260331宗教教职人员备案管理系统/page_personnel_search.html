<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗教教职人员信息公共查询系统</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="css/page_personnel_search.css">
</head>
<body>
    <p class="mod_title">宗教教职人员信息公共查询系统</p>
    <div class="mod_search">
         <p class="item_tips">身份证姓名、身份证号码、教职人员证件编号请至少填写其中一项。</p>
         <div class="item_search">
            <p class="item_saerch_tit">姓名</p>
            <div class="item_saerch_con">
                <input placeholder="请输入" type="text">
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">身份证号码</p>
            <div class="item_saerch_con">
                <input placeholder="请输入" type="text">
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">教职人员证件编号</p>
            <div class="item_saerch_con">
                <input placeholder="请输入" type="text">
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">所属宗教</p>
            <div class="item_saerch_con">
                <select class="item_int_sel" name="" id="">
                    <option value="">请选择</option>
                </select>
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">宗教/教派</p>
            <div class="item_saerch_con">
                <select class="item_int_sel" name="" id="">
                    <option value="">请选择</option>
                </select>
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">所在地区</p>
            <div class="item_saerch_con">
                <select class="item_int_sel" name="" id="">
                    <option value="">请选择</option>
                </select>
            </div>
         </div>
         <div class="item_search">
            <p class="item_saerch_tit">所在场所</p>
            <div class="item_saerch_con">
                <input placeholder="请输入" type="text">
            </div>
         </div>
         <div class="con_btn">
            <p class="item_btn item_btn_main">查询</p>
            <p class="item_btn">重置</p>
         </div>
    </div>
    <div class="mod_result">
        <p class="tit_result">查询结果</p>
        <div class="item_result">
            <div class="line_block">
                <p class="item_result_name">游晓敏</p>
                <p class="item_result_idnumber">51******0163</p>
            </div>
            <div class="line_block">
                <p class="item_result_tit">教职人员证件编号</p>
                <p class="item_result_con">51******0163</p>
            </div>
            <div class="line_block">
                <p class="item_result_tit">所属宗教</p>
                <p class="item_result_con">佛教</p>
            </div>
            <div class="line_block">
                <p class="item_result_tit">宗教/教派</p>
                <p class="item_result_con">佛教</p>
            </div>
            <div class="line_block">
                <p class="item_result_tit">所在地区</p>
                <p class="item_result_con">四川省泸州市古蔺县</p>
            </div>
            <div class="line_block">
                <p class="item_result_tit">所在场所</p>
                <p class="item_result_con">碧云寺</p>
            </div>
        </div>
        
    </div>
    <div class="pub_pop_bg">
        <!-- 弹窗-提示 -->
        <div class="pub_mod_pop pop_tips">
            <div class="mod_pop_head">
                <p class="item_pop_tit">提示</p>
                <img class="icon_close" src="images/icon_pop_close.svg" alt="">
            </div>
            <div class="mod_pop_body">
                <p class="item_tips_text">查询条件不精确，请填写更详细的条件以精确查找！</p>
            </div>
             
            
        </div>
    </div>
</body>
</html>
