<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗教教职人员备案管理系统</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="mod_login_main">
        <div class="mod_title">
            <img class="item_tit" src="images/pic_login_title.svg" alt="">
        </div>
        <div class="mod_login">
            <p class="item_title">欢迎登陆</p>
            <div class="line_block">
                <div class="item_mes">
                    <p class="item_mes_tit">手机号</p>
                    <input class="item_mes_int" placeholder="请输入" type="text">
                </div>
            </div>
            <div class="line_block">
                <div class="item_mes ">
                    <p class="item_mes_tit">密码</p>
                    <input class="item_mes_int" placeholder="请输入" type="tel">
                </div>
            </div>
            <div class="line_block">
                <div class="item_mes">
                    <p class="item_mes_tit">验证码</p>
                    <input class="item_mes_int" placeholder="请输入" type="text">
                </div>
                <img class="item_mes_jym" src="images/login_pic_yzm.png" alt="">
            </div>            
            <p class="btn_login">登录</p>
        </div>
    </div>
    
</body>
</html>
